# =============================================================
# CI/CD Pipeline — Containerized Backend + Static Frontend
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ---------- Backend CI ----------
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ---------- Frontend CI ----------
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  # ---------- Build & Push Docker Image to ACR ----------
  build-and-push:
    name: Build & Push Docker Image
    needs: [backend-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/backend:latest
            ${{ vars.AZURE_ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

  # ---------- Restart Backend (force new container pull) ----------
  restart-backend:
    name: Restart Backend
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Restart App Service (kill process to force new container)
        shell: bash
        run: |
          cat > /tmp/publish.xml << 'ENDOFXML'
          ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          ENDOFXML

          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, urllib.request, base64, json

          tree = ET.parse('/tmp/publish.xml')
          root = tree.getroot()

          scm_url = username = password = ''
          for ns in ['{http://schemas.microsoft.com/developer/msbuild/2003}', '']:
              for p in root.iter(f'{ns}publishProfile'):
                  url = p.get('publishUrl', '')
                  if 'scm' in url:
                      scm_url = url.replace(':443', '').replace('https://', '')
                      username = p.get('userName', '')
                      password = p.get('userPWD', '')
                      break
              if scm_url: break

          auth = base64.b64encode(f'{username}:{password}'.encode()).decode()
          headers = {'Authorization': f'Basic {auth}', 'Content-Type': 'application/json'}

          # Kill all processes to force container restart
          req = urllib.request.Request(f'https://{scm_url}/api/processes/', headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  for proc in json.loads(resp.read()):
                      pid = proc.get('id', '')
                      print(f'Killing process: {pid}')
                      try:
                          urllib.request.urlopen(
                              urllib.request.Request(f'https://{scm_url}/api/processes/{pid}/stop', data=b'', headers=headers, method='POST'),
                              timeout=30
                          )
                          print(f'  ✅ {pid} killed')
                      except Exception as e:
                          print(f'  ⚠️  {e}')
          except Exception as e:
              print(f'Process list failed: {e}')
              # Fallback
              try:
                  urllib.request.urlopen(
                      urllib.request.Request(f'https://{scm_url}/api/restart', data=b'', headers=headers, method='POST'),
                      timeout=120
                  )
                  print('Restart triggered')
              except Exception as e2:
                  print(f'Restart fallback: {e2}')

          print('Container restart initiated')
          PYEOF
          rm -f /tmp/publish.xml

  # ---------- Deploy Frontend to Azure Static Web Apps ----------
  deploy-frontend:
    name: Deploy Frontend
    needs: [frontend-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Create .env.production
        run: |
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}" >> .env.production
        working-directory: frontend
        shell: bash

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist

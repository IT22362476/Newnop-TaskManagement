    steps:
      - name: Restart App Service (kill process to force new container)
        shell: bash
        run: |
          cat > /tmp/publish.xml << 'ENDOFXML'
          ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          ENDOFXML

          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import urllib.request
          import base64
          import json

          tree = ET.parse('/tmp/publish.xml')
          root = tree.getroot()

          scm_url = ''
          username = ''
          password = ''

          for ns in ['{http://schemas.microsoft.com/developer/msbuild/2003}', '']:
              for profile in root.iter(f'{ns}publishProfile'):
                  url = profile.get('publishUrl', '')
                  if 'scm' in url:
                      scm_url = url.replace(':443', '').replace('https://', '')
                      username = profile.get('userName', '')
                      password = profile.get('userPWD', '')
                      break
              if scm_url:
                  break

          auth_str = f'{username}:{password}'
          auth_b64 = base64.b64encode(auth_str.encode('utf-8')).decode('utf-8')
          headers = {
              'Authorization': f'Basic {auth_b64}',
              'Content-Type': 'application/json',
          }

          # 1. List all processes
          req = urllib.request.Request(f'https://{scm_url}/api/processes/', headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  processes = json.loads(resp.read())
                  print(f'Found {len(processes)} process(es)')
                  for proc in processes:
                      pid = proc.get('id', '')
                      print(f'  Killing process: {pid}')
                      # Kill each process to force restart
                      kill_req = urllib.request.Request(
                          f'https://{scm_url}/api/processes/{pid}/stop',
                          data=b'',
                          headers=headers,
                          method='POST'
                      )
                      try:
                          urllib.request.urlopen(kill_req, timeout=30)
                          print(f'  ✅ Process {pid} killed')
                      except Exception as e:
                          print(f'  ⚠️  Process {pid}: {e}')
          except Exception as e:
              print(f'Failed to list processes: {e}')
              # Fallback: try direct restart
              print('Trying direct restart...')
              req = urllib.request.Request(
                  f'https://{scm_url}/api/restart',
                  data=b'',
                  headers=headers,
                  method='POST'
              )
              try:
                  urllib.request.urlopen(req, timeout=120)
                  print('Restart triggered')
              except Exception as e2:
                  print(f'Restart fallback: {e2}')

          print('Container restart initiated - new image will be pulled')
          PYEOF

          rm -f /tmp/publish.xml
